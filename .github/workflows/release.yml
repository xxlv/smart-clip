# Build Smart Clip: DMG (macOS) and EXE (Windows).
# Trigger: push to main, version tags v*, or manual dispatch.
# If this repo is a subdir (e.g. projectPath: smart-clip), run from repo root and set projectPath in the tauri-action step.

name: Build release (DMG + EXE)

on:
  push:
    branches: [main]
    tags: [v*]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Smart Clip v__VERSION__
          releaseBody: "See the assets to download DMG (macOS) or EXE (Windows)."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          # If the app lives in a subdir (e.g. monorepo), set projectPath:
          # projectPath: smart-clip
